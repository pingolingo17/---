<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Autoestereograma</title>
<style>
body{
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
canvas{
border:1px solid white;
}
</style>
</head>
<body>

<canvas id="stereo" width="1200" height="500"></canvas>

<script>

const canvas = document.getElementById("stereo")
const ctx = canvas.getContext("2d")

const width = canvas.width
const height = canvas.height

const patternWidth = 120
const depthStrength = 80

// --------------------
// CRIAR DEPTH MAP
// --------------------

const depthCanvas = document.createElement("canvas")
depthCanvas.width = width
depthCanvas.height = height

const dctx = depthCanvas.getContext("2d")

dctx.fillStyle="black"
dctx.fillRect(0,0,width,height)

dctx.fillStyle="white"
dctx.font="bold 200px Impact"
dctx.textAlign="center"
dctx.textBaseline="middle"

dctx.fillText("LEVIATÃ",width/2,height/2)

const depth = dctx.getImageData(0,0,width,height).data

// --------------------
// CRIAR PADRÃO BASE
// --------------------

let pattern=[]

for(let y=0;y<height;y++){

pattern[y]=[]

for(let x=0;x<patternWidth;x++){

pattern[y][x]=Math.floor(Math.random()*255)

}

}

// --------------------
// GERAR ESTEREOGRAMA
// --------------------

const img = ctx.createImageData(width,height)
const data = img.data

for(let y=0;y<height;y++){

for(let x=0;x<width;x++){

let depthValue = depth[(y*width+x)*4]/255

let shift = Math.floor(depthValue*depthStrength)

let sourceX

if(x < patternWidth){

sourceX = x

}else{

sourceX = x - patternWidth + shift

}

let color

if(x < patternWidth){

color = pattern[y][sourceX]

}else{

color = data[(y*width + sourceX)*4]

}

let i=(y*width+x)*4

data[i]=color
data[i+1]=color
data[i+2]=color
data[i+3]=255

}

}

ctx.putImageData(img,0,0)

</script>

</body>
</html>
